name: SouthSync Auto Post

on:
  schedule:
    - cron: '0 */3 * * *'

  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Required Libraries
        run: |
          pip install openai
          pip install google-api-python-client

      - name: Restore Blogger Token
        shell: bash
        run: |
          echo "${{ secrets.BLOGGER_TOKEN }}" | base64 --decode > token.pkl

      - name: Verify token.pkl
        run: |
          ls -la
          file token.pkl

      - name: Run SouthSync Automation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python auto_post.py